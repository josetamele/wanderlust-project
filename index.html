<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Wanderlust | Live Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-hover: rgba(255, 255, 255, 0.14);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
            --home-accent: #00ff88;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.5) 0, transparent 50%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            color: #94a3b8;
            margin-top: 10px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .grid-container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-bottom: 100px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            transition: opacity 0.5s ease-in-out;
        }

        .card.local-card {
            border: 1px solid var(--home-accent);
            background: rgba(0, 255, 136, 0.05);
        }

        .card:hover {
            background: var(--glass-hover);
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .badge {
            font-size: 0.6rem;
            background: var(--home-accent);
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 800;
            position: absolute;
            top: 15px;
            right: 15px;
            text-transform: uppercase;
        }

        .local-time {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            font-family: monospace;
        }

        .city { font-size: 1.25rem; font-weight: 600; }
        .country-full { font-size: 0.7rem; text-transform: uppercase; color: #64748b; margin-bottom: 12px; letter-spacing: 1px; }
        .temp { font-size: 2.8rem; font-weight: 300; margin-bottom: 8px; }
        .condition { font-size: 0.85rem; color: #cbd5e1; margin-bottom: 18px; text-transform: capitalize; }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 15px;
        }

        .modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0; top: 0;
                width: 100%; height: 100%;
                background-color: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(8px);
            }

            .modal-content {
                background: var(--glass);
                border: 1px solid var(--border);
                margin: 15% auto;
                padding: 30px;
                width: 80%;
                max-width: 500px;
                border-radius: 20px;
                color: white;
                box-shadow: 0 8px 32px rgba(0,0,0,0.5);
                position: relative;
                animation: slideIn 0.3s ease-out;
            }

            @keyframes slideIn {
                from { transform: translateY(-50px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }

            .close-btn {
                position: absolute;
                right: 20px; top: 15px;
                font-size: 28px;
                cursor: pointer;
                color: var(--accent);
            }

            .card { cursor: pointer; transition: transform 0.2s; }
            .card:hover { transform: translateY(-5px); }

        @media (max-width: 850px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 550px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>Global Wanderlust</h1>
        <p>Live Atmospheric Data & Local Time</p>
    </header>

    <div class="grid-container" id="weather-grid">
        <!-- Live Data Loads Here -->
    </div>

    
    <script>
        
        
        const regionNames = new Intl.DisplayNames(['en'], {type: 'region'});

        // The Top 10 Destinations
        const destinations = [
            { city: 'Paris', country: 'France' },
            { city: 'Tokyo', country: 'Japan' },
            { city: 'Rome', country: 'Italy' },
            { city: 'Barcelona', country: 'Spain' },
            { city: 'New York', country: 'USA' },
            { city: 'Bali', country: 'Indonesia' },
            { city: 'Lisbon', country: 'Portugal' },
            { city: 'Sydney', country: 'Australia' },
            { city: 'Dubai', country: 'UAE' },
            { city: 'Rio de Janeiro', country: 'Brazil' }
        ];

        function getLocalTime(timezoneOffset) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cityTime = new Date(utc + (1000 * timezoneOffset));
            return cityTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        // Keep this at the top level of your <script>
        function openCityInfo(cityName) {
            const modal = document.getElementById('city-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-description');
            
            const key = cityName.toLowerCase().replace(/\s+/g, '-');
            title.innerText = cityName;
            desc.innerText = cityStories[key] || "A beautiful destination waiting to be explored!";
            modal.style.display = "block";
        }

        // Global Close Logic
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('city-modal');
            const closeBtn = document.querySelector('.close-btn');
            
            if(closeBtn) closeBtn.onclick = () => modal.style.display = "none";
            window.onclick = (event) => {
                if (event.target == modal) modal.style.display = "none";
            };
        });

        // Add a parameter 'id' to your function
        function createCardHTML(data, isLocal = false) {
        const time = getLocalTime(data.timezone);
        const fullName = regionNames.of(data.sys.country);
        // Sanitize city name for use as an ID (e.g., "New York" -> "city-new-york")
        const cityId = `city-${data.name.toLowerCase().replace(/\s+/g, '-')}`;

        return `
            <div class="card ${isLocal ? 'local-card' : ''}" id="${cityId}">
                ${isLocal ? '<span class="badge">Near You</span>' : ''}
                <div class="local-time">LMT ${time}</div>
                <div class="city">${data.name}</div>
                <div class="country-full">${fullName}</div>
                <div class="temp">${Math.round(data.main.temp)}°</div>
                <div class="condition">${data.weather[0].description}</div>
                <div class="stats">
                    <span>💧 ${data.main.humidity}%</span>
                    <span>💨 ${Math.round(data.wind.speed * 3.6)}km/h</span>
                </div>
            </div>
        `;
        }

        const cityStories = {
            "tokyo": "Tokyo is a neon-lit marvel where 400-year-old shrines sit beneath futuristic skyscrapers. Originally a small fishing village named Edo, it is now the world's most populous metropolitan area, blending the Bushido spirit with high-tech innovation.",
            "paris": "Known as the 'City of Light,' Paris was the first European city to use gas street lamps. Beyond the Eiffel Tower, its history is etched into the limestone of the Latin Quarter, holding a legacy of revolutions, art movements, and world-class gastronomy.",
            "new-york": "The 'Big Apple' is a global powerhouse of culture and finance. From its origins as a Dutch trading post to the skyscrapers of Manhattan, it remains a testament to the dreams of millions of immigrants who shaped its iconic skyline.",
            "london": "A city defined by its resilience, London has survived the Great Fire and the Blitz. It is a living museum where Roman walls, medieval towers, and modern glass shards coexist along the historic banks of the River Thames.",
            "dubai": "Rising from the Arabian Desert, Dubai transformed from a pearl-diving port into a global symbol of luxury. It is home to the world's tallest building and represents the pinnacle of 21st-century architectural ambition.",
            "singapore": "The 'Garden City' is a unique island nation where tropical rainforests meet hyper-modern architecture. It is a cultural melting pot known for its strict harmony, legendary street food, and the futuristic Gardens by the Bay.",
            "rome": "The 'Eternal City' is an open-air museum. With nearly 3,000 years of globally influential art, architecture, and culture on display, walking through Rome is a journey through the heart of the Roman Empire and the Renaissance.",
            "sydney": "Built around one of the world's most stunning natural harbors, Sydney is Australia's oldest European settlement. It is famous for its sails-shaped Opera House and a lifestyle that perfectly balances urban grit with coastal serenity.",
            "cape-town": "Nestled at the foot of Table Mountain, Cape Town is a city of breathtaking dramatic landscapes. It holds a complex history of maritime discovery and a vibrant, multicultural spirit that defines modern South Africa.",
            "rio-de-janeiro": "Rio is the 'Marvelous City,' famed for its Christ the Redeemer statue and the energy of Carnival. It is a place where lush mountains meet the Atlantic, creating a rhythm of life found nowhere else on Earth."
        };


        async function initDashboard() {
            const grid = document.getElementById('weather-grid');

            // Helper function to handle the "In-Place" update
            const updateOrAddCard = (data, isLocal = false) => {
                if (data.cod !== 200) return;
                
                const cityId = `city-${data.name.toLowerCase().replace(/\s+/g, '-')}`;
                const existingCard = document.getElementById(cityId);
                const newHTML = createCardHTML(data, isLocal);

                if (existingCard) {
                    // Replace the old card with the new one without moving it
                    existingCard.outerHTML = newHTML;
                } else {
                    // If it's brand new, add it to the grid
                    if (isLocal) {
                        grid.insertAdjacentHTML('afterbegin', newHTML);
                    } else {
                        grid.insertAdjacentHTML('beforeend', newHTML);
                    }

                }
                // manage the card click event
                const cardElement = document.getElementById(cityId);
                cardElement.onclick = () => openCityInfo(data.name);

            };

            // 1. Get Local Weather
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        const res = await fetch(`/.netlify/functions/get-weather?lat=${latitude}&lon=${longitude}`);
                        const localData = await res.json();
                        updateOrAddCard(localData, true);
                    } catch (e) { console.error("Local fetch error", e); }
                });
            }

            // 2. Load the Fixed Top 10
            for (const loc of destinations) {
                try {
                    const res = await fetch(`/.netlify/functions/get-weather?city=${loc.city}`);
                    const data = await res.json();
                    updateOrAddCard(data);
                } catch (e) { console.error(e); }
            }
        }
        
        initDashboard();
        setInterval(initDashboard, 60000);
    </script>

    <div id="city-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">City Name</h2>
            <p id="modal-description">Description goes here...</p>
        </div>
    </div>

</body>
</html>
